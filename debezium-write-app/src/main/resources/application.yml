spring:
  application:
    name: debezium-write-app
  datasource:
    url: jdbc:mysql://localhost:3307/write_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: root
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate.jdbc.time_zone: UTC
      hibernate.format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    # If the database is not empty and lacks a history table, initialize it at version 0
    baseline-on-migrate: true
    baseline-version: 1
    # Prevents running migrations out of order in production
    out-of-order: false
    validate-on-migrate: true

server:
  port: 8081